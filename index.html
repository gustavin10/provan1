<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>CRUD Tarefas</title>
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-danger mb-4">
  <div class="container">
    <span class="navbar-brand">CRUD de Tarefas Gustavo Milhomem</span>
  </div>
</nav>

<div class="container">
  <div id="alerta" class="alert d-none" role="alert"></div>

  <div class="card mb-4">
    <div class="card-header bg-danger text-white">Cadastro de Tarefa</div>
    <div class="card-body">
      <form id="form-tarefa" onsubmit="salvarTarefa(this); return false;">
        <div class="row g-3">
          <div class="col-md-8">
            <label class="form-label">Descrição</label>
            <input type="text" class="form-control"
              name="descricao" placeholder="Descreva a tarefa..." required/>
          </div>
        </div>
        <div class="mt-3">
          <button id="btn-salvar" type="submit" class="btn btn-danger">Adicionar</button>
          <button type="reset" class="btn btn-outline-secondary ms-2"
            onclick="delete this.form.dataset.editId; document.getElementById('btn-salvar').textContent='Adicionar'">
            Cancelar
          </button>
        </div>
      </form>
    </div>
  </div>

  <div class="card mb-4">
    <div class="card-header">Lista de Tarefas</div>
    <div class="card-body p-0">
      <table class="table table-hover mb-0">
        <thead class="table-light">
          <tr>
            <th>Descrição</th>
            <th>Status</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="tbl-tarefas"></tbody>
      </table>
    </div>
  </div>
</div>

<script type="module" src="./main.mjs"></script>
</body>
</html>
